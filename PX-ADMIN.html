<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PX-ADMIN — Terminal Cryo</title>
  <meta name="robots" content="noindex" />
  <style>
    body {
      background: radial-gradient(circle at center, #001015, #000);
      color: #00ffe1;
      font-family: 'Courier New', monospace;
      padding: 40px;
      margin: 0;
      height: 100vh;
      overflow-y: auto;
    }
    h1 {
      font-size: 1.6em;
      margin-bottom: 10px;
    }
    .terminal {
      border: 1px solid #00ffe144;
      padding: 20px;
      background: #00000088;
      max-width: 600px;
      line-height: 1.6em;
    }
    .link {
      display: block;
      margin: 6px 0;
      color: #00ffe1;
      text-decoration: none;
    }
    .link:hover {
      text-decoration: underline;
    }
    .px-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle, #00ffe122, transparent 70%);
      animation: pulse 5s infinite;
    }
    @keyframes pulse {
      0%   { opacity: 0.2; }
      50%  { opacity: 0.6; }
      100% { opacity: 0.2; }
    }
    button {
      margin-top: 20px;
      background: transparent;
      border: 1px solid #00ffe1;
      color: #00ffe1;
      padding: 8px 16px;
      font-family: inherit;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="px-glow"></div>
  <div class="terminal">
    <h1>> PX-ADMIN // Terminal Root</h1>
    > Accès cryogénique : ADMIN_OVERRIDE<br><br>

    <a class="link" href="index.html?admin=on">🔁 index.html</a>
    <a class="link" href="ACCESS.html?admin=on">🛰️ ACCESS.html</a>

    <a class="link" href="vault.html?admin=on">🔒 vault.html</a>

    <a class="link" href="px-core.html?admin=on">🧩 px-core.html</a>
    <a class="link" href="registreTEST.html?admin=on">🗂️ registreTEST.html</a>

    <br><br>
    <button id="connect">🔗 Connecter Wallet</button>
    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script>
    document.getElementById("connect").addEventListener("click", async () => {
      const status = document.getElementById("status");
      status.textContent = "Connexion au wallet PX…";
      try {
        if (!window.solana || !window.solana.isPhantom) {
          status.textContent = "🛑 Phantom Wallet requis.";
          return;
        }
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();
        status.innerHTML = `✅ Connecté : ${wallet.slice(0, 4)}…${wallet.slice(-4)}<br>🛰️ Accès PX actif.`;
      } catch (e) {
        status.textContent = "❌ Connexion annulée.";
        console.error(e);
      }
    });
  </script>
</body>
</html>
