<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>Registre Cryo — PEREGRN</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <script>
    const allowedReferrer = "https://peregrn-official.github.io/peregrn/";
    if (!document.referrer.startsWith(allowedReferrer)) {
      alert("⛔ Accès direct non autorisé. Redirection vers le terminal PX.");
      window.location.href = "index.html";
    }
  </script>
  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: monospace;
      text-align: center;
      padding: 60px 20px;
    }

    #search {
      margin-bottom: 30px;
      padding: 10px 14px;
      font-size: 1em;
      border: none;
      background: #111;
      color: #00ffe1;
      border: 1px solid #00ffe199;
      width: 80%;
      max-width: 420px;
    }

    .fragment {
      max-width: 320px;
      margin: 30px auto;
      text-align: center;
      transition: transform 0.3s ease;
    }

    .fragment img {
      width: 100%;
      border-radius: 6px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .fragment:hover img {
      transform: scale(1.03);
      box-shadow: 0 0 10px #00ffc6aa;
    }

    .px-meta {
      text-align: left;
      max-width: 300px;
      margin: 10px auto 0;
      font-size: 0.9rem;
      color: #ccc;
    }

    .px-meta h3 {
      font-size: 1.1rem;
      color: #00ffc6;
      margin-bottom: 4px;
    }

    .px-meta p {
      margin: 4px 0;
      line-height: 1.3;
    }
  </style>
</head>

<body>

  <div id="cryo-loader"><div class="cryo-pulse"></div><p>Décompression cryogénique en cours...</p></div>

  <nav>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="about.html">À propos</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="flightlog.html">Journal de vol</a></li>
      <li><a href="registre.html" class="active">Registre Cryo</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li><a href="ACCESS.html">ACCESS</a></li>
    </ul>
  </nav>

  <h1>Registre Cryo</h1>

  <input type="text" id="search" placeholder="🔍 Recherche fragment..." />

  <section id="registry">
    <!-- Fragments PX-000 à PX-010 : insère ici exactement comme avant -->
    <!-- Chaque fragment conserve son <div class="fragment">...</div> -->
  </section>

  <footer>
    <p>&copy; 2025 PEREGRN — cryo-compilé sans roadmap</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="secureCheck.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loader = document.getElementById("cryo-loader");
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = 0;
          setTimeout(() => loader.style.display = "none", 500);
        }, 1500);
      }

      // ⌨️ VAULT1 keyboard trigger
      document.addEventListener("keydown", function(e) {
        window.vaultKeys = (window.vaultKeys || "") + e.key;
        if (window.vaultKeys.toUpperCase().includes("VAULT1")) {
          window.location.href = "px-xtr-17.html";
        }
      });

      // 🎯 Sequence REGPX ➤ glow FX
      let regKey = "";
      document.addEventListener("keydown", function(e) {
        regKey += e.key.toUpperCase();
        if (regKey.includes("REGPX")) {
          document.body.style.background = "#001010";
          document.querySelectorAll(".fragment img").forEach(img => {
            img.style.boxShadow = "0 0 12px #00ffe199";
          });
        }
        if (regKey.length > 20) regKey = regKey.slice(-10);
      });

      // 🎛 Fragments FX
      const triggers = {
        "PX-006": () => window.location.href = "ACCESS.html",
        "PX-007": (img) => {
          img.style.transform = "scale(1.05) rotateY(180deg)";
          img.style.filter = "hue-rotate(140deg)";
          setTimeout(() => {
            img.style.transform = "";
            img.style.filter = "";
          }, 1000);
        },
        "PX-009": () => window.location.href = "PX-VARIANT-EX.html"
      };

      document.querySelectorAll(".fragment img").forEach(img => {
        const code = img.alt?.trim();
        if (triggers[code]) {
          img.style.cursor = "pointer";
          img.addEventListener("click", () => triggers[code](img));
        }

        if (code === "PX-010" && Math.random() > 0.85) {
          img.style.transform = "rotate(1.5deg)";
          img.title = "Ce fragment précède ton regard.";
        }
      });

      // 🔍 Recherche fragments
      const searchInput = document.getElementById("search");
      const fragments = document.querySelectorAll(".fragment");
      searchInput.addEventListener("input", () => {
        const val = searchInput.value.toLowerCase();
        fragments.forEach(frag => {
          frag.style.display = frag.innerText.toLowerCase().includes(val) ? "" : "none";
        });
      });
    });
  </script>

</body>
</html>
