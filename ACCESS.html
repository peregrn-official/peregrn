<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>ACCESS — PEREGRN</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: radial-gradient(ellipse at center, #001015, #000);
      color: #00ffe1;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      margin: 0;
    }
    .terminal-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: left;
      padding: 20px;
    }
    .typewriter {
      font-size: 1.1em;
      white-space: pre-wrap;
      line-height: 1.5em;
      animation: flicker 1.5s infinite alternate;
    }
    @keyframes flicker {
      from { opacity: 0.88; }
      to   { opacity: 1; }
    }
    input {
      background: #000;
      border: 1px solid #00ffe1;
      color: #00ffe1;
      padding: 8px;
      font-family: inherit;
      font-size: 1em;
      width: 220px;
      text-align: center;
    }
    .access-input {
      margin-top: 20px;
    }
    .code-response, #status, #loader {
      margin-top: 20px;
      font-size: 0.9em;
      opacity: 0.9;
    }
    #loader {
      color: #00ffe199;
      display: none;
    }
    #connectBtn {
      margin-top: 30px;
      background: transparent;
      border: 2px solid #00ffe1;
      color: #00ffe1;
      font-size: 1em;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #connectBtn:hover {
      background: #00ffe122;
      box-shadow: 0 0 12px #00ffe1;
      transform: scale(1.05);
    }
    .cryo-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, #00ffe122, transparent 70%);
      z-index: -1;
      animation: pulseGlow 4s infinite;
    }
    @keyframes pulseGlow {
      0%   { opacity: 0.2; }
      50%  { opacity: 0.5; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="cryo-glow"></div>
  <div class="terminal-container">
    <div class="typewriter" id="introText"></div>

    <div class="access-input">
      <input type="text" id="access-code" placeholder="ENTRER CODE PX..." onkeypress="checkCode(event)" />
    </div>

    <button id="connectBtn">🔗 Connecter Wallet</button>
    <div id="loader">⏳ Connexion PX en cours...</div>
    <div id="status"></div>
    <div class="code-response" id="codeResponse"></div>
  </div>

  <!-- Librairie Solana + Secure JS -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="secureCheck.js"></script>

  <script>
    const lines = [
      "> [PX-TERMINAL] Initialisation…",
      "> Connexion cryogénique établie",
      "> Scan PX en attente…",
      "> Entrée manuelle ou wallet nécessaire.",
      "",
      "> Si tu comprends, tu as déjà vu l’intérieur."
    ];
    let i = 0;
    function typeLine() {
      if (i < lines.length) {
        document.getElementById("introText").innerHTML += lines[i] + "\\n";
        i++;
        setTimeout(typeLine, 700);
      }
    }
    window.onload = typeLine;

    function checkCode(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("access-code").value.trim().toUpperCase();
        const output = document.getElementById("codeResponse");
        if (input === "PX-006") {
          output.innerHTML = "🛰️ Liaison PX établie. Fragment déverrouillé.<br>➤ 'Altitude n’est pas une position. C’est une mémoire de trajectoire.'";
        } else {
          output.innerHTML = "🔒 Code inconnu. Reviens quand tu ressens le sas.";
        }
      }
    }
  </script>
</body>
</html>
