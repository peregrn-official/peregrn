<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="description" content="Terminal d’accès PX par PEREGRN. Entrez le code ou connectez votre wallet pour franchir le seuil cryogénique." />

  <!-- 🌐 Réseaux sociaux -->
  <meta property="og:title" content="Sas PX — Terminal ACCESS" />
  <meta property="og:description" content="Connexion cryogénique en cours. Code PX requis. Un fragment vous attend." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://peregrn.github.io/peregrn/ACCESS.html" />

<body>

  <nav>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="claimNFT.html">Mint</a></li>
      <li><a href="registre.html">Fragments</a></li>
    </ul>
  </nav>

  <section class="terminal">
    <h2>Terminal ACCESS PX</h2>

    <p id="introText">Veuillez entrer votre code d’accès ou connecter un wallet Solana :</p>

    <input type="text" id="access-code" placeholder="ENTRER CODE PX..." onkeypress="checkCode(event)" />

    <button id="connectBtn" class="enter-btn">🔗 Connecter Wallet</button>

    <div id="loader" style="display:none; margin-top: 20px;">⏳ Connexion PX en cours...</div>
    <div id="status" style="margin-top: 20px;"></div>
    <div id="codeResponse" class="code-response"></div>
  </section>

  <footer>
    &copy; 2025 PX SYSTEM — Terminal cryo PX par PEREGRN
  </footer>

  <script>
    function checkCode(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("access-code").value.trim();
        const response = document.getElementById("codeResponse");
        if (input === "PX-006") {
          response.innerHTML = "✅ Code accepté : accès au Fragment déverrouillé.";
        } else {
          response.innerHTML = "❌ Code inconnu ou expiré.";
        }
      }
    }

    document.getElementById("connectBtn").addEventListener("click", () => {
      const loader = document.getElementById("loader");
      const status = document.getElementById("status");
      loader.style.display = "block";
      status.innerText = "";
      setTimeout(() => {
        loader.style.display = "none";
        status.innerHTML = "🧬 Connexion simulée. Intégration réelle à venir (Phantom / Backpack).";
      }, 2500);
    });
  </script>

</body>
</html>
