<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>ACCESS — PEREGRN</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: monospace;
      padding: 40px 20px;
    }
    .terminal {
      max-width: 800px;
      margin: 0 auto;
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0, 255, 240, 0.1);
    }
    .input-line {
      margin-top: 20px;
    }
    input {
      background: #000;
      color: #00ffe1;
      border: none;
      border-bottom: 1px solid #00ffe1;
      font-size: 1rem;
      width: 100%;
      padding: 8px;
      outline: none;
    }
    .unlocked {
      margin-top: 30px;
      color: #00ffab;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="terminal" id="terminal">
    <p>> INIT.ACCESS [OK]</p>
    <p>> Listening for fragment...</p>

    <div class="input-line">
      <label for="access-code">ACCESS CODE :</label><br />
      <input type="text" id="access-code" placeholder="ex: PX-006" onkeypress="checkCode(event)" />
    </div>

    <div id="result" class="unlocked"></div>
  </div>

  <script>
    function checkCode(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("access-code").value.trim().toUpperCase();
        const output = document.getElementById("result");
        if (input === "PX-006") {
          output.innerHTML = "> ACCÈS ACCORDÉ :<br>> Lecture du fragment atmosphérique…<br><br>➤ Altitude n’est pas une position. C’est une mémoire de trajectoire.\n➤ Liaison cryo-ouverte. Decrypt.sh en cours.";
        } else {
          output.innerHTML = "> Fragment non reconnu. Try again or evacuate.";
        }
      }
    }
  </script>

</body>
</html>
