<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>ACCESS — Sas PX | PEREGRN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- ✅ SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="description" content="Terminal d’accès PX par PEREGRN. Entrez le code ou connectez votre wallet pour franchir le seuil cryogénique." />

  <!-- 🌐 Réseaux sociaux -->
  <meta property="og:title" content="Sas PX — Terminal ACCESS" />
  <meta property="og:description" content="Connexion cryogénique en cours. Code PX requis. Un fragment vous attend." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://peregrn.github.io/peregrn/ACCESS.html" />

  <!-- Style -->
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ...styles inchangés... */
  </style>
</head>
<body>
  <div class="cryo-glow"></div>
  <div class="terminal-container">
    <div class="typewriter" id="introText"></div>
    <div class="access-input">
      <input type="text" id="access-code" placeholder="ENTRER CODE PX..." onkeypress="checkCode(event)" />
    </div>
    <button id="connectBtn">🔗 Connecter Wallet</button>
    <div id="loader">⏳ Connexion PX en cours...</div>
    <div id="status"></div>
    <div class="code-response" id="codeResponse"></div>
  </div>

  <!-- Librairie JS -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="secureCheck.js"></script>
  <script>
    const lines = [
      "> [PX-TERMINAL] Initialisation…",
      "> Connexion cryogénique établie",
      "> Scan PX en attente…",
      "> Entrée manuelle ou wallet nécessaire.",
      "",
      "> Si tu comprends, tu as déjà vu l’intérieur."
    ];
    let i = 0;
    function typeLine() {
      if (i < lines.length) {
        document.getElementById("introText").innerHTML += lines[i] + "\\n";
        i++;
        setTimeout(typeLine, 700);
      }
    }
    window.onload = typeLine;

    function checkCode(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("access-code").value.trim().toUpperCase();
        const output = document.getElementById("codeResponse");
        if (input === "PX-006") {
          output.innerHTML = "🚀 Liaison PX établie. Fragment déverrouillé.<br>➤ 'Altitude n’est pas une position. C’est une mémoire de trajectoire.'";
        } else {
          output.innerHTML = "🔒 Code inconnu. Reviens quand tu ressens le sas.";
        }
      }
    }
  </script>
</body>
</html>
