<!DOCTYPE html>
<html lang="fr">
<head>  
  <meta charset="UTF-8" />
  <title>ACCESS — PEREGRN</title>
  <link rel="stylesheet" href="style.css" />
  <script>
  const allowedReferrer = "https://peregrn-official.github.io/peregrn/";
  if (!document.referrer.startsWith(allowedReferrer)) {
    alert("⛔ Accès direct non autorisé. Redirection vers le terminal PX.");
    window.location.href = "index.html";
  }
</script>
  <script>
    document.addEventListener("keydown", function(e) {
      window.vaultKeys = (window.vaultKeys || "") + e.key;
      if (window.vaultKeys.toUpperCase().includes("VAULT1")) {
        window.location.href = "px-xtr-17.html";
      }
    });
  </script>
</head>
<body>

  <div id="cryo-loader">
    <div class="cryo-pulse"></div>
    <p>Décompression cryogénique en cours...</p>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="about.html">À propos</a></li>
      <li><a href="faq.html">FAQ</a></li>
      <li><a href="flightlog.html">Journal de vol</a></li>
      <li><a href="registre.html">Registre Cryo</a></li>
      <li><a href="lore.html">Lore</a></li>
      <li><a href="ACCESS.html" class="active">ACCESS</a></li>
    </ul>
  </nav>

  <h1>Terminal Cryo</h1>

  <div class="terminal">
    <p>> INIT.ACCESS [OK]</p>
    <p>> Listening for fragment...</p>

    <div class="input-line">
      <label for="access-code">ACCESS CODE :</label><br />
      <input type="text" id="access-code" placeholder="ex: PX-006" onkeypress="checkCode(event)" />
    </div>

    <div id="result" class="unlocked"></div>
  </div>

  <footer>
    <p>&copy; 2025 PEREGRN — cryo-compilé sans roadmap</p>
  </footer>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="secureCheck.js"></script>
  <script>
    function checkCode(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("access-code").value.trim().toUpperCase();
        const output = document.getElementById("result");
        if (input === "PX-006") {
          output.innerHTML = "> ACCÈS ACCORDÉ :<br>> Lecture du fragment atmosphérique…<br><br>➤ Altitude n’est pas une position. C’est une mémoire de trajectoire.<br>➤ Liaison cryo-ouverte. Decrypt.sh en cours.";
        } else {
          output.innerHTML = "> Fragment non reconnu. Try again or evacuate.";
        }
      }
    }

    window.addEventListener("load", () => {
      const loader = document.getElementById("cryo-loader");
      if (loader) {
        loader.style.transition = "opacity 0.5s ease";
        loader.style.opacity = 0;
        setTimeout(() => loader.style.display = "none", 500);
      }
    });
  </script>
</body>
</html>
