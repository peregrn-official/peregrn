<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>PEREGRN — Sas PX</title>
  <meta name="robots" content="index" />
  <style>
    body {
      background: radial-gradient(ellipse at center, #001015, #000);
      color: #00ffe1;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      margin: 0;
      height: 100vh;
    }
    .terminal-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      padding: 20px;
      text-align: left;
    }
    .typewriter {
      font-size: 1.1em;
      white-space: pre-wrap;
      line-height: 1.5em;
      animation: flicker 1.5s infinite alternate;
    }
    @keyframes flicker {
      from { opacity: 0.88; }
      to   { opacity: 1; }
    }
    .cryo-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle, #00ffe122, transparent 70%);
      z-index: -1;
      animation: pulseGlow 4s infinite;
    }
    @keyframes pulseGlow {
      0%   { opacity: 0.2; }
      50%  { opacity: 0.5; }
      100% { opacity: 0.2; }
    }
    .enter-btn {
      margin-top: 40px;
      background: transparent;
      border: 2px solid #00ffe1;
      color: #00ffe1;
      font-size: 1em;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .enter-btn:hover {
      background: #00ffe122;
      box-shadow: 0 0 12px #00ffe1;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="cryo-glow"></div>
  <div class="terminal-container">
    <div class="typewriter" id="introText"></div>
    <button class="enter-btn" onclick="window.location.href='ACCESS.html'">🔓 Entrer dans le sas PX</button>
  </div>

  <script>
    const introLines = [
      "> [SAS PX] Initialisation cryogénique…",
      "> Fragment détecté dans la périphérie.",
      "> Synchronisation avec l’interface en cours…",
      "> Aucun message. Aucun guide.",
      "",
      "> Il faudra franchir le seuil pour comprendre."
    ];
    let i = 0;
    function typeIntro() {
      if (i < introLines.length) {
        document.getElementById("introText").innerHTML += introLines[i] + "\\n";
        i++;
        setTimeout(typeIntro, 750);
      }
    }
    window.onload = typeIntro;
  </script>
</body>
</html>
