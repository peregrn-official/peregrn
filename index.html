<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Terminal PX — Accès Cryo</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <style>
    body {
      background: #000;
      color: #00ffe1;
      font-family: monospace;
      text-align: center;
      padding: 60px 20px;
    }
    button {
      background: #00ffe1;
      color: #000;
      border: none;
      padding: 14px 30px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 30px;
    }
    .hidden { display: none; }
    .debug {
      background: rgba(0, 255, 225, 0.07);
      border: 1px solid #00ffe1;
      padding: 20px;
      margin-top: 40px;
      text-align: left;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    a { color: #00ffe1; text-decoration: none; }
  </style>
</head>
<body>

  <h1>🧊 TERMINAL PX</h1>
  <p>Connexion requise — vérification cryo de ton solde $PEREGRN</p>

  <button id="connectBtn">🔗 Connecter Wallet</button>

  <p style="margin-top:20px; font-size:0.9em; color:#00ffe199;">
    🧪 Ce terminal cryo vérifie uniquement votre solde <strong>$PEREGRN</strong>.<br>
    <strong>Aucune transaction</strong> n’est initiée, <strong>aucune signature</strong> ne vous sera demandée.
  </p>

  <div id="status" style="margin-top: 30px;"></div>
  <div id="access" class="hidden">
    <p id="rankLine"></p>
    <div id="unlocks"></div>
  </div>
  <div id="denied" class="hidden">
    <p>❌ Signature insuffisante. Accès refusé.</p>
  </div>

  <div id="debug" class="debug hidden"></div>

  <script>
    const mint = "DK3h83B1nbfTuP4pnAiXeiSQp7mHnZAZVeKa1Xmtpump";

    function getPXRank(amount) {
      if (amount >= 1_000_000) return { rank: "🦅 FALCON ARCANUM", files: ["ACCESS.html", "PX-VARIANT-EX.html", "PX-ARCHIVE.html", "PX-CORE.html", "PX-EXODUS.html", "claimNFT.html"] };
      if (amount >= 500_000)  return { rank: "🟣 FAUCON ALPHA", files: ["ACCESS.html", "PX-VARIANT-EX.html", "PX-ARCHIVE.html", "PX-CORE.html"] };
      if (amount >= 50_000)   return { rank: "🔶 FAUCON PÈLERIN", files: ["ACCESS.html", "PX-VARIANT-EX.html", "PX-ARCHIVE.html"] };
      if (amount >= 20_000)   return { rank: "🔷 FAUCON TACTIQUE", files: ["ACCESS.html", "PX-VARIANT-EX.html"] };
      if (amount >= 2_500)    return { rank: "🪶 PETIT FAUCON", files: ["ACCESS.html"] };
      if (amount >= 100)      return { rank: "VOYAGEUR", files: [] };
      return { rank: null, files: [] };
    }

    document.getElementById("connectBtn").addEventListener("click", async () => {
      const debug = document.getElementById("debug");
      debug.innerHTML = "";
      debug.classList.remove("hidden");

      if (!window.solana || !window.solana.isPhantom) {
        alert("Phantom Wallet requis.");
        return;
      }

      try {
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();
        debug.innerHTML += `🔗 Wallet connecté : ${wallet}<br><br>`;

        const connection = new solanaWeb3.Connection("https://mainnet.helius-rpc.com/?api-key=d50bd88d-c6aa-4b1b-af8c-9d9bfba9ffe3");
        const tokenAccounts = await connection.getParsedTokenAccountsByOwner(
          new solanaWeb3.PublicKey(wallet),
          { programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA") }
        );

        let amount = 0;
        tokenAccounts.value.forEach((account) => {
          const info = account.account.data.parsed.info;
          if (info.mint === mint) {
            amount = parseFloat(info.tokenAmount.uiAmount);
          }
        });

        debug.innerHTML += `🧬 $PEREGRN détectés : ${amount}<br>`;

        const rank = getPXRank(amount);
        if (rank.rank) {
          document.getElementById("access").classList.remove("hidden");
          document.getElementById("rankLine").innerText = `🛰️ Rang PX : ${rank.rank}`;
          const files = rank.files.map(file => `<a href="${file}" target="_blank">➤ ${file}</a>`).join("<br>");
          document.getElementById("unlocks").innerHTML = `<br>🔓 Accès débloqués :<br>${files}`;
        } else {
          document.getElementById("denied").classList.remove("hidden");
        }

      } catch (e) {
        console.error(e);
        alert("Erreur lors de la connexion au wallet.");
      }
    });
  </script>

</body>
</html>
