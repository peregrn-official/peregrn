<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8">
  <title>Terminal PX — Accès Cryo</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #000;
      color: #00ffe1;
      font-family: monospace;
      text-align: center;
      padding: 60px 20px;
    }
    button {
      background: #00ffe1;
      color: #000;
      border: none;
      padding: 14px 30px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 30px;
    }
    .hidden { display: none; }
    .debug {
      background: rgba(0, 255, 225, 0.07);
      border: 1px solid #00ffe1;
      padding: 20px;
      margin-top: 40px;
      text-align: left;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    #loader {
      margin-top: 20px;
      font-size: 0.9em;
      color: #00ffe199;
      animation: blink 1.4s infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.3; }
    }
    a { color: #00ffe1; text-decoration: none; }
  </style>
</head>
<body>

  <h1>🧊 TERMINAL PX</h1>
  <p>Connexion requise — vérification cryo de ton solde $PEREGRN</p>

  <button id="connectBtn">🔗 Connecter Wallet</button>
  <div id="loader" class="hidden">Analyse cryo en cours...</div>

  <p style="margin-top:20px; font-size:0.9em; color:#00ffe199;">
    🧪 Ce terminal cryo vérifie uniquement votre solde <strong>$PEREGRN</strong>.<br>
    <strong>Aucune transaction</strong> n’est initiée, <strong>aucune signature</strong> ne vous sera demandée.
  </p>

  <div id="status" style="margin-top: 30px;"></div>
  <div id="access" class="hidden">
    <p id="rankLine"></p>
    <div id="unlocks"></div>
  </div>
  <div id="denied" class="hidden">
    <p>❌ Signature insuffisante. Accès refusé.</p>
  </div>

  <div id="debug" class="debug hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="secureCheck.js"></script>

</body>
</html>
