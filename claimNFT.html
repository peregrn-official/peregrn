<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Claim NFT PX</title>
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: monospace;
      text-align: center;
      padding: 80px 20px;
    }
    button {
      background: #00ffe1;
      color: #000;
      border: none;
      padding: 14px 30px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 30px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <h1>🎁 NFT PX — Réclamation Cryo</h1>
  <p>Uniquement accessible aux porteurs de rang : FALCON ARCANUM</p>

  <button id="connectBtn">🔗 Connecter Wallet</button>
  <div id="status" style="margin-top: 40px;"></div>
  <div id="mintZone" class="hidden">
    <p>✅ Rang confirmé : prêt à minter votre NFT PX.</p>
    <button onclick="alert('Mint en cours... (fonction à implémenter)')">✨ Mint mon NFT PX</button>
  </div>

  <script>
    document.getElementById("connectBtn").addEventListener("click", async () => {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Phantom Wallet est requis !");
        return;
      }

      try {
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();
        document.getElementById("status").innerText = `Wallet connecté : ${wallet}`;
        document.getElementById("mintZone").classList.remove("hidden");

        // TODO : intégrer vérification on-chain + fonction de mint ici

      } catch (e) {
        console.error(e);
        alert("Erreur lors de la connexion au wallet.");
      }
    });
  </script>

</body>
</html>
