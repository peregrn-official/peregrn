<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>Claim NFT PX</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />

  <!-- 🔒 Sécurité anti-accès direct -->
  <script>
    const allowedReferrer = "https://peregrn-official.github.io/peregrn/";
    if (!document.referrer.startsWith(allowedReferrer)) {
      alert("⛔ Accès direct non autorisé. Redirection vers le terminal PX.");
      window.location.href = "index.html";
    }
  </script>

  <!-- 🧠 VaultKey clavier -->
  <script>
    document.addEventListener("keydown", function(e) {
      window.vaultKeys = (window.vaultKeys || "") + e.key;
      if (window.vaultKeys.toUpperCase().includes("VAULT1")) {
        window.location.href = "px-xtr-17.html";
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: monospace;
      text-align: center;
      padding: 80px 20px;
    }
    button {
      background: #00ffe1;
      color: #000;
      border: none;
      padding: 14px 30px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 30px;
    }
    .hidden { display: none; }
  </style>
</head>

<body>

  <div id="cryo-loader">
    <div class="cryo-pulse"></div>
    <p>Déverrouillage cryogénique en cours...</p>
  </div>

  <h1>🎁 NFT PX — Réclamation Cryo</h1>
  <p>Uniquement accessible aux porteurs de rang : <strong>FALCON ARCANUM</strong></p>

  <button id="connectBtn">🔗 Connecter Wallet</button>
  <div id="status" style="margin-top: 40px; white-space: pre-line;"></div>

  <div id="mintZone" class="hidden">
    <p>✅ Rang confirmé : prêt à minter votre NFT PX.</p>
    <button onclick="alert('⛏️ Mint PX simulé… (fonction cryogénique en attente de contrat)')">✨ Mint mon NFT PX</button>
  </div>

  <!-- 🔐 Liaison secure PX -->
  <script src="secureCheck.js"></script>

  <script>
    // ✅ Jeton PX de test pour Devnet
    const TOKEN_PX_ADDRESS = "7G2QbU3R9rkoZ6vVZq3vZz9ZxkZx9Zz9ZxkZx9Zz9Zxk";

    async function walletHasPXToken(walletAddress) {
      const connection = new solanaWeb3.Connection("https://api.devnet.solana.com");
      const accounts = await connection.getParsedTokenAccountsByOwner(
        new solanaWeb3.PublicKey(walletAddress),
        {
          programId: new solanaWeb3.PublicKey("TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA")
        }
      );

      return accounts.value.some(account => {
        const info = account.account.data.parsed.info;
        return info.mint === TOKEN_PX_ADDRESS && parseInt(info.tokenAmount.amount) > 0;
      });
    }

    document.getElementById("connectBtn").addEventListener("click", async () => {
      if (!window.solana || !window.solana.isPhantom) {
        alert("Phantom Wallet est requis !");
        return;
      }

      try {
        const resp = await window.solana.connect();
        const wallet = resp.publicKey.toString();
        document.getElementById("status").innerText = `Wallet connecté : ${wallet}`;

        const hasPX = await walletHasPXToken(wallet);
        if (hasPX) {
          document.getElementById("mintZone").classList.remove("hidden");
        } else {
          document.getElementById("status").innerText += `\n⛔ Token PX non détecté — mint inaccessible.`;
        }
      } catch (e) {
        console.error(e);
        alert("Erreur lors de la connexion au wallet.");
      }
    });

    window.addEventListener("load", () => {
      const loader = document.getElementById("cryo-loader");
      if (loader) {
        loader.style.transition = "opacity 0.5s ease";
        loader.style.opacity = 0;
        setTimeout(() => (loader.style.display = "none"), 500);
      }
    });
  </script>

</body>
</html>
