<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>PX-NFT | Fracture Manifestée</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 60px 20px;
    }
    .px-header {
      font-size: 1.6em;
      margin-bottom: 40px;
    }
    .mint-img {
      width: 240px;
      border: 2px solid #00ffe1;
      border-radius: 4px;
      margin: 20px auto;
    }
    .mint-button {
      margin-top: 30px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid #00ffe1;
      color: #00ffe1;
      font-size: 1em;
      letter-spacing: 0.1em;
      cursor: not-allowed;
      opacity: 0.4;
    }
    .glitch {
      font-style: italic;
      opacity: 0.65;
      font-size: 0.9em;
      margin-top: 30px;
      animation: glitch 6s infinite;
    }
    @keyframes glitch {
      0%, 100% { transform: translateX(0); opacity: 0.5; }
      50% { transform: translateX(-2px); opacity: 1; }
    }
    #secretMint {
      display: none;
      margin-top: 40px;
      font-size: 1em;
    }
  </style>
</head>
<body>

  <div class="px-header">PX-NFT | Fracture Manifestée</div>

  <img src="fragments/px-mintable.PNG" alt="Fragment PX NFT" class="mint-img" />

  <button class="mint-button" disabled>MINT INITIATE ></button>

  <div class="glitch">> Erreur : Fragment PX verrouillé — signature absente.</div>

  <div id="secretMint">
    <p>🔓 <strong>Mint débloqué :</strong> <a href="https://fractal.peregrn.io/" target="_blank">Accéder au forgeur PX</a></p>
  </div>

  <script>
    // Séquence clavier : UNMINT ➜ Affiche zone mint
    let pxKey = "";
    document.addEventListener("keydown", function(e) {
      pxKey += e.key.toUpperCase();
      if (pxKey.includes("UNMINT")) {
        document.getElementById("secretMint").style.display = "block";
      }
      if (pxKey.length > 20) pxKey = pxKey.slice(-10);
    });
  </script>

</body>
</html>
