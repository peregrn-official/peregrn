<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>404 — Fragment introuvable</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    document.addEventListener("keydown", function(e) {
      window.vaultKeys = (window.vaultKeys || "") + e.key;
      if (window.vaultKeys.toUpperCase().includes("VAULT1")) {
        window.location.href = "vault.html";
      }
    });
  </script>
  <style>
    body {
      background-color: #000;
      color: #ff0044;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .error-code {
      font-size: 3rem;
    }
    .glitch {
      font-size: 1.2rem;
      color: #888;
      margin-top: 10px;
    }
    a {
      color: #00ffe1;
      margin-top: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="error-code">✖ 404 — Fragment introuvable</div>
  <div class="glitch">Le fragment que tu recherches n'existe pas.<br>Ou il a été cryo-effacé.</div>
  <a href="index.html">↩ Revenir à l’origine</a>

</body>
</html>
