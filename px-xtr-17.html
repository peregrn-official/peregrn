<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PX-XTR-17 — PEREGRN</title>
  <link rel="stylesheet" href="style.css" />

  <!-- 🔒 Sécurité anti-referrer -->
  <script>
    const allowedReferrer = "https://peregrn-official.github.io/peregrn/";
    if (!document.referrer.startsWith(allowedReferrer)) {
      alert("⛔ Accès direct non autorisé. Redirection vers le terminal PX.");
      window.location.href = "index.html";
    }
  </script>

  <!-- 🧠 Vault + EXE Trigger -->
  <script>
    document.addEventListener("keydown", function(e) {
      window.vaultKeys = (window.vaultKeys || "") + e.key;
      if (window.vaultKeys.toUpperCase().includes("VAULT1")) {
        window.location.href = "px-xtr-17.html"; // Redondant mais maintenu
      }
      window.unlocked = (window.unlocked || "") + e.key;
      if (window.unlocked.toUpperCase().includes("EXE")) {
        document.getElementById("exe-container").style.display = "block";
      }
    });
  </script>

  <style>
    body {
      background-color: #000;
      color: #00ffe1;
      font-family: monospace;
      padding: 40px;
      overflow-x: hidden;
    }
    .typewriter {
      white-space: pre-line;
      overflow: hidden;
      border-right: 2px solid #00ffe1;
      animation: blink 0.8s infinite;
      font-size: 1.2em;
      min-height: 120px;
    }
    @keyframes blink {
      0%, 100% { border-color: #00ffe1; }
      50% { border-color: transparent; }
    }
    .artifact img {
      margin-top: 30px;
      width: 300px;
      max-width: 80%;
      filter: drop-shadow(0 0 10px #00ffe1);
    }
    .exe-mode {
      background: rgba(0, 255, 225, 0.1);
      border: 1px solid #00ffe1;
      padding: 20px;
      margin-top: 40px;
      display: none;
      color: #ffffff;
    }
    a {
      color: #00ffe1;
      text-decoration: none;
    }
    footer {
      margin-top: 60px;
      font-size: 0.9em;
      color: #00ffe1;
    }
  </style>
</head>

<body>

  <div class="typewriter" id="terminal-output"></div>

  <div class="artifact">
    <img src="assets/PX-XTR-17.png" alt="Fragment PX-XTR" />
  </div>

  <div class="exe-mode" id="exe-container">
    <h2>PX-XTR.EXE : Accès Avancé</h2>
    <p>Vous avez exécuté un chemin que peu trouveront.<br>Le Fragment spectral vous observe désormais.</p>
    <p><a href="PX-VARIANT-EX.html">→ Accéder au Fragment EX</a></p>
  </div>

  <p style="margin-top: 40px;"><a href="index.html">↩ Retour à l’origine</a></p>

  <footer>
    &copy; 2025 PEREGRN — Fragment XTR déverrouillé
  </footer>

  <!-- 🔐 Sécurité Phantom + solde -->
  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@latest/lib/index.iife.min.js"></script>
  <script src="secureCheck.js"></script>

  <!-- ⌨️ Typewriter -->
  <script>
    const text = `SYNCHRONISATION CRYO... OK
> Fragment PX-XTR-17 détecté
> Spectre extra-dimensionnel stabilisé

"Ce que tu as ouvert n’a pas encore de nom..."`;

    let i = 0;
    const speed = 40;
    const output = document.getElementById("terminal-output");

    function typeWriter() {
      if (i < text.length) {
        output.textContent += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      }
    }
    typeWriter();
  </script>

</body>
</html>
